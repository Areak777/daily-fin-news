name: 每日财经新闻盘前纪要

on:
  schedule:
    - cron: '50 0 * * 1-5'
  push:
    paths:
      - 'reports/*.md'
  workflow_dispatch:
    inputs:
      report_file:
        description: '报告文件名 (如 jiuyan_panzhen_20260320.md)'
        required: false
        default: ''

jobs:
  send-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Find latest report
        id: find
        run: |
          REPORT_FILE="${{ github.event.inputs.report_file }}"
          if [ -z "$REPORT_FILE" ]; then
            # Find most recent .md file in reports/
            REPORT_FILE=$(ls -t reports/*.md 2>/dev/null | head -1)
            REPORT_FILE=$(basename "$REPORT_FILE" 2>/dev/null || echo "")
          fi
          if [ -z "$REPORT_FILE" ]; then
            echo "No report found in reports/"
            exit 1
          fi
          echo "file=$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "Found report: $REPORT_FILE"

      - name: Send email
        run: |
          python send_news_email.py --md "reports/${{ steps.find.outputs.file }}"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: |
            reports/
            output/
          retention-days: 30
